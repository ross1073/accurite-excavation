[build]
  command = "npm run build"
  publish = "dist"

# Remove trailing slashes to match Astro's trailingSlash: 'never' config
# Prevents trailing-slash URLs from hitting the 404 page (which has noindex)
[[redirects]]
  from = "/:splat/"
  to = "/:splat"
  status = 301
  force = false

# Block raw .md source files from being served
[[redirects]]
  from = "/blog/*.md"
  to = "/blog/:splat"
  status = 301
  force = true

# Old WordPress URLs → current equivalents
[[redirects]]
  from = "/services/hauling"
  to = "/services/hauling-delivery"
  status = 301

[[redirects]]
  from = "/new/reviews"
  to = "/reviews"
  status = 301

[[redirects]]
  from = "/services/retaining-walls/*"
  to = "/services/rock-walls-retaining-walls"
  status = 301

[[redirects]]
  from = "/best-utah-excavation-company"
  to = "/"
  status = 301

[[redirects]]
  from = "/residential-excavation-by-accurite-excavation-in-utah"
  to = "/services/residential-excavation"
  status = 301

[[redirects]]
  from = "/commercial-construction-begins-here-precision-excavation-services-in-utah-by-accurite"
  to = "/services/commercial-projects"
  status = 301

# Kill all old WP RSS feed URLs
[[redirects]]
  from = "/*/feed"
  to = "/blog"
  status = 301
  force = true

# Old WP blog posts → closest current equivalents
[[redirects]]
  from = "/qualified-general-engineers-in-utah"
  to = "/services/government-projects"
  status = 301

[[redirects]]
  from = "/utah-ogden-excavation-*"
  to = "/"
  status = 301

[[redirects]]
  from = "/steam-plant-hill-air-force-base-utah/*"
  to = "/blog/hill-afb-steam-plant-project"
  status = 301

# Old WP service/category paths → current equivalents
[[redirects]]
  from = "/our-services/*"
  to = "/services"
  status = 301

[[redirects]]
  from = "/services/s-3"
  to = "/services"
  status = 301

[[redirects]]
  from = "/category/commercial"
  to = "/services/commercial-projects"
  status = 301

[[redirects]]
  from = "/category/residential*"
  to = "/services/residential-excavation"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/services"
  status = 301

# Old WP gallery items → current gallery
[[redirects]]
  from = "/gallery/*"
  to = "/gallery"
  status = 301

# Kill old WordPress junk — 410 Gone
[[redirects]]
  from = "/wp-admin/*"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/author/*"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/blog/page/*"
  to = "/blog"
  status = 301

# Block WP search URLs
[[redirects]]
  from = "/?s=*"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
