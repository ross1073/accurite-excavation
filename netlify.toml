[build]
  command = "npm run build"
  publish = "dist"

# Remove trailing slashes to match Astro's trailingSlash: 'never' config
[[redirects]]
  from = "/:splat/"
  to = "/:splat"
  status = 301
  force = false

# Block raw .md source files — individual rules because Netlify
# does not support literal text after a * wildcard
[[redirects]]
  from = "/blog/basement-excavation-vs-dig-out.md"
  to = "/blog/basement-excavation-vs-dig-out"
  status = 301
  force = true

[[redirects]]
  from = "/blog/avoid-flooding-new-home.md"
  to = "/blog/avoid-flooding-new-home"
  status = 301
  force = true

[[redirects]]
  from = "/blog/soil-stabilization-importance.md"
  to = "/blog/soil-stabilization-importance"
  status = 301
  force = true

[[redirects]]
  from = "/blog/national-park-service-project.md"
  to = "/blog/national-park-service-project"
  status = 301
  force = true

[[redirects]]
  from = "/blog/how-much-does-excavation-cost-utah.md"
  to = "/blog/how-much-does-excavation-cost-utah"
  status = 301
  force = true

[[redirects]]
  from = "/blog/retaining-wall-permit-utah.md"
  to = "/blog/retaining-wall-permit-utah"
