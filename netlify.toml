[build]
  command = "npm run build"
  publish = "dist"

# Remove trailing slashes to match Astro's trailingSlash: 'never' config
# Prevents trailing-slash URLs from hitting the 404 page (which has noindex)
[[redirects]]
  from = "/:splat/"
  to = "/:splat"
  status = 301
  force = false

# Block WP search URLs — _redirects can't match query strings
[[redirects]]
  from = "/"
  to = "/"
  status = 301
  query = {s = ":value"}
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
