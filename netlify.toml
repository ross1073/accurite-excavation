  force = true

[[redirects]]
  from = "/blog/camp-williams-shooting-range.md"
  to = "/blog/camp-williams-shooting-range"
  status = 301
  force = true

[[redirects]]
  from = "/blog/retaining-wall-types-utah-soil.md"
  to = "/blog/retaining-wall-types-utah-soil"
  status = 301
  force = true

[[redirects]]
  from = "/blog/what-is-emod-experience-modification-rate.md"
  to = "/blog/what-is-emod-experience-modification-rate"
  status = 301
  force = true

[[redirects]]
  from = "/blog/evaluate-excavation-subcontractors-utah.md"
  to = "/blog/evaluate-excavation-subcontractors-utah"
  status = 301
  force = true

# Old WordPress URLs → current equivalents
[[redirects]]
  from = "/services/hauling"
  to = "/services/hauling-delivery"
  status = 301
  force = true

[[redirects]]
  from = "/new/reviews"
  to = "/reviews"
  status = 301
  force = true

[[redirects]]
  from = "/services/retaining-walls/*"
  to = "/services/rock-walls-retaining-walls"
  status = 301
  force = true

[[redirects]]
  from = "/best-utah-excavation-company"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/residential-excavation-by-accurite-excavation-in-utah"
  to = "/services/residential-excavation"
  status = 301
  force = true

[[redirects]]
  from = "/commercial-construction-begins-here-precision-excavation-services-in-utah-by-accurite"
  to = "/services/commercial-projects"
  status = 301
  force = true

# Kill all old WP RSS feed URLs
[[redirects]]
  from = "/*/feed"
  to = "/blog"
  status = 301
  force = true

# Old WP blog posts → closest current equivalents
[[redirects]]
  from = "/qualified-general-engineers-in-utah"
  to = "/services/government-projects"
  status = 301
  force = true

[[redirects]]
  from = "/utah-ogden-excavation-*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/steam-plant-hill-air-force-base-utah/*"
  to = "/blog/hill-afb-steam-plant-project"
  status = 301
  force = true

# Old WP service/category paths → current equivalents
[[redirects]]
  from = "/our-services/*"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/services/s-3"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/category/commercial"
  to = "/services/commercial-projects"
  status = 301
  force = true

[[redirects]]
  from = "/category/residential*"
  to = "/services/residential-excavation"
  status = 301
  force = true

[[redirects]]
  from = "/category/*"
  to = "/services"
  status = 301
  force = true

# Old WP gallery items → current gallery
[[redirects]]
  from = "/gallery/*"
  to = "/gallery"
  status = 301

# Kill old WordPress junk — 301 to homepage (Netlify 410 unreliable)
[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/page/*"
  to = "/blog"
  status = 301
  force = true

# Block WP search URLs — Netlify needs query param syntax
[[redirects]]
  from = "/"
  to = "/"
  status = 301
  query = {s = ":value"}
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
